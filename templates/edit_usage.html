<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<title>車両利用履歴編集</title>

<style>

body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

input,
select,
button {
    padding: 5px;
    margin: 5px;
}

</style>

</head>

<body>

<h2>車両利用履歴編集</h2>

<form
    action="/update_usage/{{ usage_id }}"
    method="post"
>

    指示数<br>

    <input
        type="number"
        name="meter_value"
        value="{{ row[5] if row[5] else '' }}"
    >

    <br><br>

    給油量(L)<br>

    <input
        type="number"
        step="0.1"
        name="fuel_amount"
        value="{{ row[6] if row[6] else '' }}"
    >

    <br><br>

    車両<br>

    <select name="vehicle_name">

        {% for v in vehicles %}

        <option
            value="{{ v[0] }}"
            {% if v[0] == row[1] %}
            selected
            {% endif %}
        >
            {{ v[0] }}
        </option>

        {% endfor %}

    </select>

    <br><br>

    使用者<br>

    <input
        type="text"
        name="user_name"
        value="{{ row[2] if row[2] else '' }}"
    >

    <br><br>

    使用目的<br>

    <input
        type="text"
        name="purpose"
        value="{{ row[7] if row[7] else '' }}"
    >

    <br><br>

    <button type="submit">
        保存
    </button>

</form>

<br>

<a href="/vehicle_history">
    戻る
</a>

</body>

</html>
