<!DOCTYPE html>

<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>貸出履歴</title>

<style>
    body {
        font-family: Arial;
        text-align: center;
        background: #f5f5f5;
    }

    table {
        margin: auto;
        border-collapse: collapse;
        width: 95%;
        background: white;
    }

    th,
    td {
        border: 1px solid #ccc;
        padding: 8px;
    }
</style>

</head>

<body>

<h1>貸出履歴</h1>

<div>

<a href="/history?date={{ prev_date }}&vehicle={{ vehicle }}">
    &lt;
</a>

<form action="/history"
      method="get"
      style="display:inline;">

    <input type="date"
           name="date"
           value="{{ target_date }}"
           onchange="this.form.submit()">

    <select name="vehicle"
            onchange="this.form.submit()">

        <option value="全体">
            全体
        </option>

        {% for v in vehicles %}

        <option value="{{ v[0] }}"
            {% if vehicle == v[0] %}
                selected
            {% endif %}
        >
            {{ v[0] }}
        </option>

        {% endfor %}

    </select>

</form>

<a href="/history?date={{ next_date }}&vehicle={{ vehicle }}">
    &gt;
</a>

</div>

<br>

<a href="/">
    <button>戻る</button>
</a>

<table>

<tr>
    <th>ID</th>
    <th>車両</th>
    <th>使用者</th>
    <th>操作</th>
    <th>種別</th>
    <th>時刻</th>
</tr>

{% for row in rows %}

<tr>

    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>

    <td>
        {% if row[5] %}
            {{ row[5][:16] }}
        {% endif %}
    </td>

</tr>

{% endfor %}

</table>

</body>
</html>
